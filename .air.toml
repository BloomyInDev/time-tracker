root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/time-tracker ./cmd/time-tracker"
  entrypoint = "./tmp/time-tracker"
  args_bin = ["serve"]
  include_ext = ["go"]
  exclude_dir = ["tmp", "bin"]
  delay = 100

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"
